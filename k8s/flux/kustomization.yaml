apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: demiurge
  namespace: flux-system
spec:
  interval: 1m
  path: ./k8s/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: demiurge
  targetNamespace: demiurge
  images:
    - name: demiurge
      newName: ghcr.io/dustyhorizon/demiurge
      newTag: latest
