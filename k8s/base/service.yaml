apiVersion: v1
kind: Service
metadata:
  name: demiurge
  namespace: demiurge
  labels:
    app: demiurge
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: health
  selector:
    app: demiurge
