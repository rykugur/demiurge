apiVersion: v1
kind: ServiceAccount
metadata:
  name: demiurge
  namespace: demiurge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demiurge
  namespace: demiurge
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demiurge
  namespace: demiurge
subjects:
  - kind: ServiceAccount
    name: demiurge
    namespace: demiurge
roleRef:
  kind: Role
  name: demiurge
  apiGroup: rbac.authorization.k8s.io
